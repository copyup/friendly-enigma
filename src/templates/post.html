<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ post.title }}">
    <meta name="keywords" content="博客,文章,{{ post.title }}">
    <meta name="author" content="我的博客">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ post.title }} - 我的博客">
    <meta property="og:description" content="{{ post.title }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="/posts/{{ post.id }}">
    <meta property="og:site_name" content="我的博客">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ post.title }} - 我的博客">
    <meta name="twitter:description" content="{{ post.title }}">
    
    <!-- Article Meta -->
    <meta property="article:published_time" content="{{ published_at }}">
    <meta property="article:modified_time" content="{{ updated_at }}">
    <meta property="article:author" content="我的博客">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="/posts/{{ post.id }}">
    
    <!-- JSON-LD Structured Data - BlogPosting -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{% raw %}{{ post.title }}{% endraw %}",
        "description": "{% raw %}{{ post.title }}{% endraw %}",
        "url": "https://tinlike.com/posts/{% raw %}{{ post.slug }}{% endraw %}",
        "datePublished": "{% raw %}{{ published_at }}{% endraw %}",
        "dateModified": "{% raw %}{{ updated_at }}{% endraw %}",
        "author": {
            "@type": "Organization",
            "name": "我的博客",
            "url": "https://tinlike.com"
        },
        "publisher": {
            "@type": "Organization",
            "name": "我的博客",
            "logo": {
                "@type": "ImageObject",
                "url": "https://tinlike.com/logo.png"
            }
        },
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "https://tinlike.com/posts/{% raw %}{{ post.slug }}{% endraw %}"
        }
    }
    </script>
    
    <!-- JSON-LD Structured Data - BreadcrumbList -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            {
                "@type": "ListItem",
                "position": 1,
                "name": "首页",
                "item": "https://tinlike.com/"
            },
            {
                "@type": "ListItem",
                "position": 2,
                "name": "文章",
                "item": "https://tinlike.com/posts"
            },
            {
                "@type": "ListItem",
                "position": 3,
                "name": "{% raw %}{{ post.title }}{% endraw %}",
                "item": "https://tinlike.com/posts/{% raw %}{{ post.slug }}{% endraw %}"
            }
        ]
    }
    </script>
    
    <title>{{ post.title }} - 我的博客</title>
    <link rel="stylesheet" href="/static/output.css">
</head>
<body class="bg-gray-100 text-gray-800 leading-relaxed">
    <header class="bg-white shadow-sm mb-8">
        <div class="max-w-6xl mx-auto px-5 py-5">
            <h1 class="text-2xl font-bold">
                <a href="/" class="text-gray-800 hover:text-primary-600 transition-colors">我的博客</a>
            </h1>
            <nav class="mt-4 space-x-5">
                <a href="/" class="text-gray-600 hover:text-primary-600 transition-colors">首页</a>
                <a href="/posts" class="text-gray-600 hover:text-primary-600 transition-colors">文章</a>
                <a href="/categories" class="text-gray-600 hover:text-primary-600 transition-colors">分类</a>
                <a href="/pages/about" class="text-gray-600 hover:text-primary-600 transition-colors">关于</a>
            </nav>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-5">
        <article class="bg-white rounded-lg shadow-sm p-10" itemscope itemtype="https://schema.org/Article">
            <h1 class="text-3xl font-bold mb-4 text-gray-800" itemprop="headline">{{ post.title }}</h1>
            <div class="post-content leading-loose prose prose-gray max-w-none" itemprop="articleBody">
                {{ content_html|safe }}
            </div>
            <a href="/" class="inline-block mt-8 text-primary-600 hover:text-primary-700 transition-colors">← 返回首页</a>
        </article>
    </div>

    <footer class="text-center py-8 text-gray-500 mt-8">
        <div class="max-w-6xl mx-auto px-5">
            <p>&copy; 2026 我的博客。All rights reserved。</p>
        </div>
    </footer>
</body>
</html>
