<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="文章分类 - 我的博客">
    <meta name="keywords" content="博客,分类,技术,生活">
    <meta name="author" content="我的博客">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="分类 - 我的博客">
    <meta property="og:description" content="浏览文章分类">
    <meta property="og:type" content="website">
    <meta property="og:url" content="/categories">
    <meta property="og:site_name" content="我的博客">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="分类 - 我的博客">
    <meta name="twitter:description" content="浏览文章分类">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="/categories">
    
    <!-- JSON-LD Structured Data - CollectionPage -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "文章分类 - 我的博客",
        "description": "浏览文章分类",
        "url": "https://tinlike.com/categories",
        "isPartOf": {
            "@type": "WebSite",
            "name": "我的博客",
            "url": "https://tinlike.com"
        },
        "mainEntity": {
            "@type": "ItemList",
            "itemListElement": [
            {% raw %}{% for category_item in categories %}{% endraw %}
                {
                    "@type": "ListItem",
                    "position": {% raw %}{{ loop.index }}{% endraw %},
                    "item": {
                        "@type": "Thing",
                        "name": "{% raw %}{{ category_item.category.name }}{% endraw %}"
                    }
                }{% raw %}{% if not loop.last %},{% endif %}{% endraw %}
            {% raw %}{% endfor %}{% endraw %}
            ]
        }
    }
    </script>
    
    <!-- JSON-LD Structured Data - BreadcrumbList -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            {
                "@type": "ListItem",
                "position": 1,
                "name": "首页",
                "item": "https://tinlike.com/"
            },
            {
                "@type": "ListItem",
                "position": 2,
                "name": "分类",
                "item": "https://tinlike.com/categories"
            }
        ]
    }
    </script>
    
    <title>分类 - 我的博客</title>
    <link rel="stylesheet" href="/static/output.css">
</head>
<body class="bg-gray-100 text-gray-800 leading-relaxed">
    <header class="bg-white shadow-sm mb-8">
        <div class="max-w-6xl mx-auto px-5 py-5">
            <h1 class="text-2xl font-bold">
                <a href="/" class="text-gray-800 hover:text-primary-600 transition-colors">我的博客</a>
            </h1>
            <nav class="mt-4 space-x-5">
                <a href="/" class="text-gray-600 hover:text-primary-600 transition-colors">首页</a>
                <a href="/posts" class="text-gray-600 hover:text-primary-600 transition-colors">文章</a>
                <a href="/categories" class="text-gray-600 hover:text-primary-600 transition-colors">分类</a>
                <a href="/pages/about" class="text-gray-600 hover:text-primary-600 transition-colors">关于</a>
            </nav>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-5">
        <div class="bg-white rounded-lg shadow-sm p-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">文章分类</h2>
            <ul class="list-none">
            {% for category_item in categories %}
                <li class="py-4 border-b border-gray-200 last:border-b-0">
                    <div>
                        <span class="text-lg font-medium text-gray-800 hover:text-primary-600 transition-colors">{{ category_item.category.name }}</span>
                    </div>
                </li>
            {% endfor %}
            </ul>
        </div>
    </div>

    <footer class="text-center py-8 text-gray-500 mt-8">
        <div class="max-w-6xl mx-auto px-5">
            <p>&copy; 2026 我的博客。All rights reserved。</p>
        </div>
    </footer>
</body>
</html>
